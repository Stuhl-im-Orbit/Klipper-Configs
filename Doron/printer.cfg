# -- Doron Velta . printer.cfg ------------------------------------------------
#
#   Mainboard:       Bigtreetech SKRat V1.0
#   Probe:           Membrane Pressure Leveling Adapter
#   Extruder:        Orbiter V2.5
#   Hotend:          Phaetus Dragon High-Flow
#   Filament Sensor:
#   Docs:            https://github.com/Stuhl-im-Orbit/Klipper-Configs.git
#                    https://github.com/rogerlz/Doron-Velta
#                    https://www.klipper3d.org/Config_Reference.html
#                    https://github.com/mainsail-crew/mainsail-config
#                    https://github.com/andrewmcgr/klipper_tmc_autotune
#
# ------------------------------------------------------------------------------


# -- MCU definitions -----------------------------------------------------------

[mcu]
serial:         /dev/serial/by-id/usb-Klipper_stm32g0b1xx_btt-skrat-10-if00
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu


# -- Mainsail ------------------------------------------------------------------

[include mainsail.cfg]


# -- Optional features ---------------------------------------------------------

[endstop_phase]

[exclude_object]

[force_move]
enable_force_move: True

[gcode_arcs]
resolution: 0.5

[respond]


# -- Printer kinematics --------------------------------------------------------

[printer]
kinematics:             delta
max_velocity:           250
max_z_velocity:         250
max_accel:              5000
square_corner_velocity: 10
minimum_z_position:     -5
print_radius:           78
# delta_radius:         111.85


# -- X/Y steppers --------------------------------------------------------------

[stepper_a]
step_pin:          PF9
dir_pin:           PD7
enable_pin:        !PD6
rotation_distance: 40
microsteps:        32
endstop_pin:       ^PB5
homing_speed:      20
# angle:           210.56
# arm_length:      215.00
# position_endstop: 165.23

[tmc2209 stepper_a]
uart_pin:       PF10
uart_address:   0
interpolate:    True
run_current:    1.0
sense_resistor: 0.110

[stepper_b]
step_pin:          PD3
dir_pin:           PD2
enable_pin:        !PD5
rotation_distance: 40
microsteps:        32
endstop_pin:       ^PC1
homing_speed:      20
# angle:           329.42
# arm_length:      215.00
# position_endstop: 164.98

[tmc2209 stepper_b]
uart_pin:       PD4
uart_address:   0
interpolate:    True
run_current:    1.0
sense_resistor: 0.110


# -- Z stepper(s) --------------------------------------------------------------

[stepper_c]
step_pin:          PA15
dir_pin:           PF8
enable_pin:        !PC9
rotation_distance: 40
microsteps:        32
endstop_pin:       ^PC0
homing_speed:      20
# angle:           90.00
# arm_length:      215.00
# position_endstop: 164.93

[tmc2209 stepper_c]
uart_pin:       PC8
uart_address:   0
interpolate:    True
run_current:    1.0
sense_resistor: 0.110


# -- Extruder ------------------------------------------------------------------

[extruder]
step_pin:                     PC7
dir_pin:                      PC6
enable_pin:                   !PD9
rotation_distance:            4.637
microsteps:                   16
nozzle_diameter:              0.400
filament_diameter:            1.75
max_extrude_only_velocity:    60
max_extrude_only_distance:    200
max_extrude_cross_section:    5
heater_pin:                   PE13
sensor_type:                  ATC Semitec 104GT-2
sensor_pin:                   PA3
min_temp:                     10
max_temp:                     275
min_extrude_temp:             180
pressure_advance:             0.050
pressure_advance_smooth_time: 0.030
smooth_time:                  0.5
# control:                    pid
# pid_kp:                     23.928
# pid_ki:                     1.595
# pid_kd:                     89.731

[tmc2209 extruder]
uart_pin:       PD8
interpolate:    True
run_current:    0.80
sense_resistor: 0.110

[firmware_retraction]
retract_length:         1.2
retract_speed:          120
unretract_extra_length: 0.0
unretract_speed:        120


# -- TMC autotune --------------------------------------------------------------

[autotune_tmc stepper_a]
motor:       ldo-42sth48-2504ac
tuning_goal: performance
voltage:     24

[autotune_tmc stepper_b]
motor:       ldo-42sth48-2504ac
tuning_goal: performance
voltage:     24

[autotune_tmc stepper_c]
motor:       ldo-42sth48-2504ac
tuning_goal: performance
voltage:     24

[autotune_tmc extruder]
motor:       ldo-36sth20-1004ahg
tuning_goal: performance
voltage:     24


# -- Bed heater ----------------------------------------------------------------

[heater_bed]
heater_pin:  PB3
sensor_type: EPCOS 100K B57560G104F
sensor_pin:  PB2
min_temp:    0
max_temp:    115
# control:   pid
# pid_kp:    61.308
# pid_ki:    3.168
# pid_kd:    296.578


# -- Probe ---------------------------------------------------------------------

[probe]
pin:                       !PE5
x_offset:                  0
y_offset:                  0
# z_offset:                0.2
samples:                   3
samples_result:            median
sample_retract_dist:       3
samples_tolerance:         0.001
samples_tolerance_retries: 5


# -- Bed leveling & mesh -------------------------------------------------------

[delta_calibrate]
radius:            70
speed:             20
horizontal_move_z: 10

[bed_mesh]
speed:             50
horizontal_move_z: 10
mesh_radius:       70
mesh_origin:       0, 0
round_probe_count: 7
algorithm:         bicubic


# -- Fan control ---------------------------------------------------------------

[fan]
pin:             PD14
shutdown_speed:  0.0
kick_start_time: 0.2

[heater_fan hotend_Fan]
pin:            PD15
shutdown_speed: 1.0
kick_start_time: 0.5  # default placeholder to align keys
heater:         extruder
heater_temp:    45

[controller_fan controller_Fan]
pin:             PD13
shutdown_speed:  0.0
kick_start_time: 0.5  # default placeholder to align keys
fan_speed:       1.0
off_below:       0.1
heater:          heater_bed


# -- LEDs ----------------------------------------------------------------------

[neopixel Toolhead]
pin:           PE4
chain_count:   1
color_order:   GRBW
initial_RED:   0.0
initial_GREEN: 0.0
initial_BLUE:  0.0
initial_WHITE: 1.0


# -- Accelerometer & shaper ----------------------------------------------------

[adxl345]
cs_pin:   rpi:None
axes_map: -x, z, y

[resonance_tester]
accel_chip:   adxl345
probe_points: 0, 0, 20

[input_shaper]
shaper_freq_x: 119
shaper_type_x: zv
shaper_freq_y: 114.8
shaper_type_y: zv


# -- Temperature sensors -------------------------------------------------------

[temperature_sensor SKRat]
sensor_type: temperature_mcu
min_temp:    0
max_temp:    100

[temperature_sensor Pi4]
sensor_type: temperature_host
min_temp:    0
max_temp:    100


# -- Idle timeout --------------------------------------------------------------

[idle_timeout]
timeout: 3600
gcode:
    {% if printer.pause_resume.is_paused %}
        ; Keep bed on during pauses to prevent part detachment
        _NOTIFY MSG="System: Idle timeout. Extruder OFF, Bed stays ON."
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    {% else %}
        _NOTIFY MSG="System: Idle timeout. Steppers OFF, Heaters OFF."
        TURN_OFF_HEATERS
        M107
        M84
    {% endif %}


# -- Variables & init ----------------------------------------------------------

[gcode_macro _CLIENT_VARIABLE]
description: Set variables -- Mainsail config
variable_use_custom_pos:   True
variable_custom_park_x:    0.0
variable_custom_park_y:    0.0
variable_custom_park_dz:   30.0
variable_speed_move:       250.0
variable_park_at_cancel:   True
variable_use_fw_retract:   True
variable_idle_timeout:     43200  # 12h
variable_user_pause_macro: "_HOOK_ON_PAUSE"
variable_user_resume_macro: "_HOOK_ON_RESUME"
variable_user_cancel_macro: "_HOOK_ON_CANCEL"
gcode:

[gcode_macro _MY_VARS]
description: Store variables -- Central config dictionary
variable_cfg_travel_factor_xy: 0.8    # X/Y travel speed factor
variable_cfg_travel_factor_z:  0.8    # Z travel speed factor
variable_cfg_z_hop_home:       10.0   # Z-hop before homing/moves (mm)
variable_cfg_z_hop_heat:       15.0   # Z-hop during heat soak (mm)
variable_center_x:             0
variable_center_y:             0
variable_calc_travel_speed_xy: 12000  # 250 x 0.8 x 60
variable_calc_travel_speed_z:  12000  # 250 x 0.8 x 60
variable_cfg_purge_x:          -5.0   # purge start X (mm)
variable_cfg_purge_y:          -70.0  # purge start Y (mm)
variable_cfg_purge_z:          0.8    # purge height Z (mm)
variable_cfg_speed_purge:      144.0  # purge extrusion speed
variable_cfg_fallback_temp_ext: 220.0 # extruder fallback when no target is set (C)
variable_cfg_preheat_ext:      150.0  # hotend temp during bed heat soak (C)
variable_cfg_fil_load_dist:    100.0  # fast load distance (mm)
variable_cfg_fil_purge_dist:   40.0   # slow purge after load (mm)
variable_cfg_fil_unload_dist:  100.0  # fast unload distance (mm)
gcode:

[delayed_gcode _INIT_MY_VARS]
initial_duration: 2.0
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set max_vel   = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_z_vel = printer.configfile.settings.printer.max_z_velocity|float %}
    {% set speed_xy  = (max_vel   * vars.cfg_travel_factor_xy * 60)|int %}
    {% set speed_z   = (max_z_vel * vars.cfg_travel_factor_z  * 60)|int %}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_xy VALUE={speed_xy}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_z  VALUE={speed_z}

[delayed_gcode settoolheadneopixel]
initial_duration: 5
gcode:
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 WHITE=1 INDEX=1


# -- Print lifecycle -----------------------------------------------------------

[gcode_macro PRINT_START]
description: Execute sequence -- Main startup procedure
gcode:
    {% set vars        = printer["gcode_macro _MY_VARS"] %}
    {% set target_bed  = params.BED_TEMP|default(60.0)|float %}
    {% set target_ext  = params.EXTRUDER_TEMP|default(200.0)|float %}
    G21 G90 M83
    _RESET_STATE
    ; Start bed non-blocking, then block on hotend preheat -- both heat in parallel
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={target_bed}
    _NOTIFY MSG="Process: Waiting for nozzle to {vars.cfg_preheat_ext}C..."
    M109 S{vars.cfg_preheat_ext}
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
    _NOTIFY MSG="Process: Waiting for bed {target_bed}C..."
    M190 S{target_bed}
    BED_MESH_PROFILE LOAD=default ; Load active bed mesh
    ; Move to purge position before final heat-up -- prevents ooze onto bed center
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
    G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}
    _NOTIFY MSG="Process: Heating nozzle to {target_ext}C..."
    M109 S{target_ext}
    PURGE  ; Execute priming
    _NOTIFY MSG="Process: Print started."

[gcode_macro PRINT_END]
description: Execute sequence -- Finalize print job
gcode:
    M400
    G10
    TURN_OFF_HEATERS
    M107
    _TOOLHEAD_PARK_PAUSE_CANCEL
    M84
    _RESET_STATE
    _NOTIFY MSG="Process: Print finished."


# -- Movement & homing ---------------------------------------------------------

[gcode_macro _CONDITIONAL_HOME]
description: Home axes -- G28 only if axes are not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes|lower %}
        _NOTIFY MSG="System: Axes not homed. Executing G28..."
        G28
    {% else %}
        _NOTIFY MSG="System: Axes already homed. Skipping G28."
    {% endif %}

[gcode_macro CENTER]
description: Move toolhead -- Center with safe Z-bounding
gcode:
    {% set vars   = printer["gcode_macro _MY_VARS"] %}
    {% set z_safe = [printer.toolhead.position.z|float + vars.cfg_z_hop_home,
                     printer.toolhead.axis_maximum.z|float]|min %}
    _NOTIFY MSG="System: Moving to center..."
    SAVE_GCODE_STATE NAME=STATE_CENTER
    G90
    G0 Z{z_safe} F{vars.calc_travel_speed_z}
    G0 X{vars.center_x} Y{vars.center_y} F{vars.calc_travel_speed_xy}
    M400
    RESTORE_GCODE_STATE NAME=STATE_CENTER


# -- Calibration & tuning ------------------------------------------------------

[gcode_macro BED_MESH_CALIBRATE]
description: Calibrate bed -- Generate mesh
rename_existing: _MY_BED_MESH_CALIBRATE
gcode:
    _NOTIFY MSG="Process: Generating mesh..."
    _MY_BED_MESH_CALIBRATE {rawparams}

[gcode_macro PID_BED]
description: Tune PID -- Bed heater calibration
gcode:
    {% set target_temp = params.TEMP|default(100.0)|float %}
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    _NOTIFY MSG="System: Bed PID tuning at {target_temp}C..."
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}
    PID_CALIBRATE HEATER=heater_bed TARGET={target_temp}
    _NOTIFY MSG="System: Bed PID done. Save config."

[gcode_macro PID_HOTEND]
description: Tune PID -- Extruder heater calibration
gcode:
    {% set target_temp = params.TEMP|default(245.0)|float %}
    {% set fan_speed   = params.FAN|default(64)|int %}  # ~25% -- simulates ABS print conditions
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    _NOTIFY MSG="System: Extruder PID tuning at {target_temp}C..."
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}
    M106 S{fan_speed}
    PID_CALIBRATE HEATER=extruder TARGET={target_temp}
    M107
    _NOTIFY MSG="System: Extruder PID done. Save config."


# -- Extruder & filament -------------------------------------------------------

[gcode_macro PURGE]
description: Extrude plastic -- Prime nozzle line
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% if printer.extruder.can_extrude %}
        _NOTIFY MSG="Process: Priming nozzle..."
        SAVE_GCODE_STATE NAME=STATE_PURGE
        G90
        M83
        G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
        G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}
        G0 Z{vars.cfg_purge_z} F{vars.calc_travel_speed_z}
        G1 E5 F{vars.cfg_speed_purge}
        G1 X{vars.cfg_purge_x + 20.0} E20 F{vars.cfg_speed_purge}
        G10
        G0 Y{vars.cfg_purge_y + 10.0} Z{vars.cfg_purge_z + 0.8} F{vars.calc_travel_speed_xy}
        M400
        RESTORE_GCODE_STATE NAME=STATE_PURGE
    {% else %}
        _NOTIFY MSG="System Error: Extruder cold. Cannot purge."
    {% endif %}

[gcode_macro LOAD_FILAMENT]
description: Load filament -- Temperature priority managed
gcode:
    {% set vars        = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp    = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set param_temp  = params.TEMP|default(0)|float %}
    {% set cur_target  = printer.extruder.target|float %}
    {% set saved_temp  = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}
    {% set ns = namespace(target=vars.cfg_fallback_temp_ext) %}
    {% if cur_target >= min_temp %}{% set ns.target = cur_target  %}{% endif %}
    {% if saved_temp >= min_temp %}{% set ns.target = saved_temp  %}{% endif %}
    {% if param_temp >= min_temp %}{% set ns.target = param_temp  %}{% endif %}
    {% if ns.target >= min_temp %}
        _NOTIFY MSG="Filament: Heating to {ns.target}C..."
        SAVE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
        M109 S{ns.target}
        M83
        _NOTIFY MSG="Filament: Loading {vars.cfg_fil_load_dist}mm..."
        G1 E{vars.cfg_fil_load_dist} F600
        G4 P1000
        _NOTIFY MSG="Filament: Purging {vars.cfg_fil_purge_dist}mm..."
        G1 E{vars.cfg_fil_purge_dist} F100
        G10
        M400
        RESTORE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
        ; Clear saved state only after successful load -- prevents interference with manual swaps
        SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE=0.0
        _NOTIFY MSG="Filament: Load complete. Hotend at {ns.target}C."
    {% else %}
        _NOTIFY MSG="System Error: Target {ns.target}C below min_extrude_temp. Aborting."
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament -- Temperature priority managed
gcode:
    {% set vars       = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp   = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set param_temp = params.TEMP|default(0)|float %}
    {% set cur_target = printer.extruder.target|float %}
    {% set saved_temp = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}
    {% set ns = namespace(target=vars.cfg_fallback_temp_ext) %}
    {% if cur_target >= min_temp %}{% set ns.target = cur_target  %}{% endif %}
    {% if saved_temp >= min_temp %}{% set ns.target = saved_temp  %}{% endif %}
    {% if param_temp >= min_temp %}{% set ns.target = param_temp  %}{% endif %}
    {% if ns.target >= min_temp %}
        _NOTIFY MSG="Filament: Heating to {ns.target}C..."
        SAVE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
        M109 S{ns.target}
        M83
        _NOTIFY MSG="Filament: Shaping tip..."
        ; Tip shaping -- push then rapidly cycle to break strings before unload
        G1 E10.0 F300
        G1 E-15.0 F3000
        {% for _ in range(4) %}
            G1 E2.0 F3000
            G1 E-2.0 F3000
        {% endfor %}
        _NOTIFY MSG="Filament: Unloading {vars.cfg_fil_unload_dist}mm..."
        G1 E-{vars.cfg_fil_unload_dist} F300
        M400
        RESTORE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
        _NOTIFY MSG="Filament: Unload complete."
    {% else %}
        _NOTIFY MSG="System Error: Target {ns.target}C below min_extrude_temp. Aborting."
    {% endif %}

[gcode_macro M600]
description: Change filament -- Initiate swap process
gcode:
    {% set target = printer.extruder.target|float %}
    SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE={target}
    PAUSE
    M400
    UNLOAD_FILAMENT TEMP={target}
    ; Cool down to prevent cooking filament during extended absence
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    _NOTIFY MSG="Action: Change filament. Extruder cooling down."


# -- G-code aliases ------------------------------------------------------------

[gcode_macro G27]
description: Dummy -- Park toolhead (Marlin)
gcode:
    _TOOLHEAD_PARK_PAUSE_CANCEL

[gcode_macro G29]
description: Dummy -- Bed mesh (Marlin)
gcode:
    BED_MESH_CALIBRATE

[gcode_macro G32]
description: Dummy -- Home + bed level (RepRap)
gcode:
    _CONDITIONAL_HOME

[gcode_macro M108]
description: Dummy -- Cancel Heating (Marlin)
gcode:

[gcode_macro M116]
description: Dummy -- Wait for all temperatures (RepRap)
gcode:

[gcode_macro M201]
description: Dummy -- Set Max Acceleration (Marlin)
gcode:

[gcode_macro M203]
description: Dummy -- Set Max Feedrate (Marlin)
gcode:

[gcode_macro M205]
description: Dummy -- Set Jerk (Marlin)
gcode:

[gcode_macro M300]
description: Dummy -- Play Tone (Marlin/RepRap)
gcode:

[gcode_macro M572]
description: Dummy -- Set Pressure Advance (RepRap)
gcode:
    {% set pa = params.S|default(-1.0)|float %}
    {% if pa >= 0.0 %}
        SET_PRESSURE_ADVANCE ADVANCE={pa}
    {% endif %}

[gcode_macro M900]
description: Dummy -- Set Pressure Advance (Marlin/Cura)
gcode:
    {% set param_s = params.S|default(-1.0)|float %}
    {% set pa      = params.K|default(param_s)|float %}
    M572 S{pa}

[gcode_macro M601]
description: Dummy -- Pause print (PrusaSlicer/Marlin)
gcode:
    PAUSE

[gcode_macro M701]
description: Dummy -- Load filament (Marlin)
gcode:
    {% set param_t    = params.T|default(0)|float %}
    {% set target_temp = params.S|default(param_t)|float %}
    LOAD_FILAMENT TEMP={target_temp}

[gcode_macro M702]
description: Dummy -- Unload filament (Marlin)
gcode:
    {% set param_t    = params.T|default(0)|float %}
    {% set target_temp = params.S|default(param_t)|float %}
    UNLOAD_FILAMENT TEMP={target_temp}


# -- Input shaping -------------------------------------------------------------

[gcode_shell_command generate_shaper_graphs_x]
command: /home/pi/printer_data/config/scripts/generate-shaper-graph-x.sh
timeout: 90.
verbose: True

[gcode_macro GENERATE_SHAPER_GRAPHS_X]
description: Generate graphs -- Input shaper resonance for X axis
gcode:
    G28
    SHAPER_CALIBRATE AXIS=X
    RUN_SHELL_COMMAND CMD=generate_shaper_graphs_x
    _NOTIFY MSG="Process: Input shaper graph generated. Check input_shaper folder in the machine tab."

[gcode_shell_command generate_shaper_graphs_y]
command: /home/pi/printer_data/config/scripts/generate-shaper-graph-y.sh
timeout: 90.
verbose: True

[gcode_macro GENERATE_SHAPER_GRAPHS_Y]
description: Generate graphs -- Input shaper resonance for Y axis
gcode:
    G28
    SHAPER_CALIBRATE AXIS=Y
    RUN_SHELL_COMMAND CMD=generate_shaper_graphs_y
    _NOTIFY MSG="Process: Input shaper graph generated. Check input_shaper folder in the machine tab."


# -- System helpers ------------------------------------------------------------

[gcode_macro _PRINT_STATE]
description: Store state -- Temperature memory across pauses and M600
variable_saved_ext_temp: 0.0
gcode:

[gcode_macro _NOTIFY]
description: Output text -- Push message to console
gcode:
    { action_respond_info(params.MSG) }

[gcode_macro _RESET_STATE]
description: Reset state -- Clear speed factors and variables
gcode:
    M220 S100
    M221 S100
    BED_MESH_CLEAR
    CLEAR_PAUSE
    {% set max_vel   = printer.configfile.settings.printer.max_velocity %}
    {% set max_accel = printer.configfile.settings.printer.max_accel %}
    {% set max_sqv   = printer.configfile.settings.printer.square_corner_velocity %}
    SET_VELOCITY_LIMIT VELOCITY={max_vel} ACCEL={max_accel} SQUARE_CORNER_VELOCITY={max_sqv}
    SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE=0.0

[gcode_macro _HOOK_ON_PAUSE]
description: Execute hook -- When print is paused
gcode:
    _NOTIFY MSG="System: Print paused"

[gcode_macro _HOOK_ON_RESUME]
description: Execute hook -- When print is resumed
gcode:
    _NOTIFY MSG="System: Print resumed"

[gcode_macro _HOOK_ON_CANCEL]
description: Execute hook -- When print is canceled
gcode:
    _NOTIFY MSG="System: Print canceled."
    _RESET_STATE

