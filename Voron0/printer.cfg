# -- Voron 0 . printer.cfg ----------------------------------------------------
#
#   Mainboard:       Bigtreetech SKR Pico V1.0
#   Toolboard:       LDO Picobilical
#   Probe:
#   Extruder:        Galileo 2
#   Hotend:          E3D Revo
#   Filament Sensor: DIY Microswitch
#   Docs:            https://github.com/Stuhl-im-Orbit/Klipper-Configs.git
#                    https://github.com/VoronDesign/Voron-0
#                    https://www.klipper3d.org/Config_Reference.html
#                    https://github.com/mainsail-crew/mainsail-config
#                    https://github.com/andrewmcgr/klipper_tmc_autotune
#                    https://github.com/Frix-x/klippain-shaketune
#
# ------------------------------------------------------------------------------


# -- MCU definitions -----------------------------------------------------------

[mcu]
serial:         /dev/serial/by-id/usb-Klipper_rp2040_45503571290F3D58-if00
restart_method: command

[mcu umb]
serial:         /dev/serial/by-id/usb-Klipper_rp2040_48313136300D1F9B-if00
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu


# -- Mainsail ------------------------------------------------------------------

[include mainsail.cfg]


# -- Optional features ---------------------------------------------------------

[exclude_object]

[force_move]
enable_force_move: True

[gcode_arcs]
resolution: 0.5

[respond]

[shaketune]
show_macros_in_webui: True

[skew_correction]


# -- Printer kinematics --------------------------------------------------------

[printer]
kinematics:             corexy
max_velocity:           500
max_accel:              8000
max_z_velocity:         20
max_z_accel:            350
square_corner_velocity: 5


# -- X/Y steppers --------------------------------------------------------------

[stepper_x]
step_pin:                gpio11
dir_pin:                 gpio10
enable_pin:              !gpio12
rotation_distance:       40
microsteps:              32
full_steps_per_rotation: 200
endstop_pin:             tmc2209_stepper_x:virtual_endstop
position_endstop:        120
position_max:            120
homing_speed:            40
homing_retract_dist:     0
homing_positive_dir:     True

[tmc2209 stepper_x]
uart_pin:       gpio9
tx_pin:         gpio8
uart_address:   0
diag_pin:       ^gpio4
interpolate:    True
run_current:    0.50
sense_resistor: 0.110

[stepper_y]
step_pin:                gpio6
dir_pin:                 gpio5
enable_pin:              !gpio7
rotation_distance:       40
microsteps:              32
full_steps_per_rotation: 200
endstop_pin:             tmc2209_stepper_y:virtual_endstop
position_endstop:        120
position_max:            120
homing_speed:            40
homing_retract_dist:     0
homing_positive_dir:     True

[tmc2209 stepper_y]
uart_pin:       gpio9
tx_pin:         gpio8
uart_address:   2
diag_pin:       ^gpio3
interpolate:    True
run_current:    0.50
sense_resistor: 0.110


# -- Z stepper(s) --------------------------------------------------------------

[stepper_z]
step_pin:            gpio19
dir_pin:             !gpio28
enable_pin:          !gpio2
rotation_distance:   8
microsteps:          32
endstop_pin:         ^gpio25
position_min:        0
position_max:        121
homing_speed:        20
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin:       gpio9
tx_pin:         gpio8
uart_address:   1
interpolate:    True
run_current:    0.37
sense_resistor: 0.110


# -- Extruder ------------------------------------------------------------------

[extruder]
step_pin:                     gpio14
dir_pin:                      gpio13
enable_pin:                   !gpio15
rotation_distance:            47.088
gear_ratio:                   9:1
microsteps:                   16
full_steps_per_rotation:      200
nozzle_diameter:              0.400
filament_diameter:            1.75
max_extrude_only_velocity:    60
max_extrude_only_distance:    200
max_extrude_cross_section:    5
heater_pin:                   umb:gpio4
sensor_type:                  ATC Semitec 104GT-2
sensor_pin:                   umb:gpio29
pullup_resistor:              2200
min_temp:                     10
max_temp:                     270
min_extrude_temp:             180
pressure_advance:             0.030
pressure_advance_smooth_time: 0.040
control:                      pid
pid_kp:                       36.707
pid_ki:                       4.617
pid_kd:                       72.953

[tmc2209 extruder]
uart_pin:       gpio9
tx_pin:         gpio8
uart_address:   3
interpolate:    True
run_current:    0.6
sense_resistor: 0.110

[firmware_retraction]
retract_length:         0.5
retract_speed:          60
unretract_extra_length: 0
unretract_speed:        60


# -- TMC autotune --------------------------------------------------------------

[autotune_tmc stepper_x]
motor:       ldo-35sth52-1504ah
tuning_goal: performance
sg4_thrs:    91  # use highest value that will not cause a false trigger in sensorless homing
voltage:     24

[autotune_tmc stepper_y]
motor:       ldo-35sth52-1504ah
tuning_goal: performance
sg4_thrs:    91  # use highest value that will not cause a false trigger in sensorless homing
voltage:     24

[autotune_tmc stepper_z]
motor:       ldo-42sth25-1004cl200et
tuning_goal: silent
voltage:     24

[autotune_tmc extruder]
motor:       ldo-36sth20-1004ahg-9T
tuning_goal: performance
voltage:     24


# -- Bed heater ----------------------------------------------------------------

[heater_bed]
heater_pin:  gpio21
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin:  gpio26
min_temp:    0
max_temp:    120
control:     pid
pid_kp:      71.641
pid_ki:      1.274
pid_kd:      1007.455
smooth_time: 3.0


# -- Bed leveling & mesh -------------------------------------------------------

[bed_screws]
screw1:      60,5
screw1_name: front screw
screw2:      5,115
screw2_name: back left
screw3:      115,115
screw3_name: back right


# -- Fan control ---------------------------------------------------------------

[fan]
pin:             umb:gpio2
shutdown_speed:  0.0
max_power:       1.0
kick_start_time: 0.5
cycle_time:      0.010
off_below:       0.13

[heater_fan hotend_fan]
pin:             umb:gpio3
shutdown_speed:  1.0
max_power:       1.0
kick_start_time: 0.5
heater:          extruder
heater_temp:     40.0

[controller_fan pcb_fan]
pin:             gpio20
shutdown_speed:  0.0
max_power:       1.0
kick_start_time: 0.5
cycle_time:      0.01
off_below:       0.1
heater:          heater_bed, extruder
stepper:         stepper_x, stepper_y, stepper_z

[fan_generic nevermore]
pin:             gpio18
shutdown_speed:  0.0
max_power:       1.0
kick_start_time: 5.0
cycle_time:      0.01
off_below:       0.1


# -- LEDs & buzzer ---------------------------------------------------------

[output_pin caselight]
pin:            gpio23
value:          1.0
shutdown_value: 0.0
pwm:            True
cycle_time:     0.01

[neopixel bed_light]
pin:           gpio24
chain_count:   1
color_order:   GRBW
initial_RED:   0.0
initial_GREEN: 0.0
initial_BLUE:  0.0
initial_WHITE: 1.0

[output_pin beeper]
pin:            umb:gpio5
value:          0
shutdown_value: 0


# -- Filament sensors ----------------------------------------------------------

[filament_switch_sensor runout_sensor]
switch_pin:      gpio16
pause_on_runout: false  # M600 handles pause + unload instead of bare PAUSE
runout_gcode:
    _NOTIFY MSG="Filament: Filament Runout"
    M600
event_delay:     5.0
pause_delay:     1.0


# -- Accelerometer & shaper ----------------------------------------------------

[adxl345]
cs_pin:   rpi:None
axes_map: -x, z, y

[resonance_tester]
accel_chip:   adxl345
probe_points: 60, 60, 20

[input_shaper]
shaper_freq_x:   70.4
shaper_type_x:   mzv
shaper_freq_y:   66.8
shaper_type_y:   ei
damping_ratio_x: 0.055
damping_ratio_y: 0.054


# -- Temperature sensors -------------------------------------------------------

[temperature_sensor Pi]
sensor_type: temperature_host
min_temp:    0
max_temp:    100

[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp:    0
max_temp:    100

[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1:  32116.0
temperature2: 40.0
resistance2:  5309.0
temperature3: 80.0
resistance3:  1228.0

[temperature_sensor chamber]
sensor_type:     CMFB103F3950FANT
sensor_pin:      umb:gpio28
pullup_resistor: 2200
min_temp:        0
max_temp:        100
gcode_id:        chamber_th


# -- Idle timeout --------------------------------------------------------------

[idle_timeout]
timeout: 3600
gcode:
    {% if printer.pause_resume.is_paused %}
        ; Keep bed on during pauses to prevent part detachment
        _NOTIFY MSG="System: Idle timeout. Extruder OFF, Bed stays ON."
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    {% else %}
        _NOTIFY MSG="System: Idle timeout. Steppers OFF, Heaters OFF."
        TURN_OFF_HEATERS
        M107
        SET_FAN_SPEED FAN=nevermore SPEED=0.0
        UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=0
        M84
    {% endif %}


# -- Variables & init ----------------------------------------------------------

[gcode_macro _CLIENT_VARIABLE]
description: Set variables -- Mainsail config
variable_use_custom_pos:   True
variable_custom_park_x:    60.0
variable_custom_park_y:    80.0
variable_custom_park_dz:   15.0
variable_speed_move:       300.0
variable_park_at_cancel:   True
variable_use_fw_retract:   True
variable_idle_timeout:     43200  # 12h
variable_user_pause_macro: "_HOOK_ON_PAUSE"
variable_user_resume_macro: "_HOOK_ON_RESUME"
variable_user_cancel_macro: "_HOOK_ON_CANCEL"
gcode:

[gcode_macro _MY_VARS]
description: Store variables -- Central config dictionary
variable_cfg_travel_factor_xy: 0.8    # X/Y travel speed factor
variable_cfg_travel_factor_z:  0.8    # Z travel speed factor
variable_cfg_z_hop_home:       10.0   # Z-hop before homing/moves (mm)
variable_cfg_z_hop_heat:       15.0   # Z-hop during heat soak (mm)
variable_calc_travel_speed_xy: 19200  # 400 x 0.8 x 60
variable_calc_travel_speed_z:  480    # 10 x 0.8 x 60
variable_calc_center_x:        60.0   # stepper_x position_max / 2
variable_calc_center_y:        60.0   # stepper_y position_max / 2
variable_cfg_bed_high_temp:    90.0   # threshold for ABS/ASA + Nevermore (C)
variable_cfg_fallback_temp_ext: 220.0 # extruder fallback when no target is set (C)
variable_cfg_preheat_ext:      150.0  # hotend temp during bed heat soak (C)
variable_cfg_purge_x:          5.0    # blob start X (mm)
variable_cfg_purge_y:          20.0   # blob start Y (mm)
variable_cfg_fil_load_dist:    100.0  # fast load distance (mm)
variable_cfg_fil_purge_dist:   40.0   # slow purge after load (mm)
variable_cfg_fil_unload_dist:  100.0  # fast unload distance (mm)
variable_cfg_homing_current:   0.50   # reduced current during StallGuard tap (A)
gcode:

[delayed_gcode _INIT_MY_VARS]
initial_duration: 2.0
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set max_vel   = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_z_vel = printer.configfile.settings.printer.max_z_velocity|float %}
    {% set max_x     = printer.toolhead.axis_maximum.x|float %}
    {% set max_y     = printer.toolhead.axis_maximum.y|float %}
    {% set speed_xy  = (max_vel   * vars.cfg_travel_factor_xy * 60)|int %}
    {% set speed_z   = (max_z_vel * vars.cfg_travel_factor_z  * 60)|int %}
    {% set center_x  = (max_x / 2.0)|float %}
    {% set center_y  = (max_y / 2.0)|float %}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_xy VALUE={speed_xy}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_z  VALUE={speed_z}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_center_x        VALUE={center_x}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_center_y        VALUE={center_y}


# -- Print lifecycle -----------------------------------------------------------

[gcode_macro PRINT_START]
description: Execute sequence -- Main startup procedure
gcode:
    {% set vars        = printer["gcode_macro _MY_VARS"] %}
    {% set target_bed  = params.BED_TEMP|default(60.0)|float %}
    {% set target_ext  = params.EXTRUDER_TEMP|default(200.0)|float %}
    {% set ns          = namespace(high_temp = target_bed >= vars.cfg_bed_high_temp) %}
    {% set target_cha  = params.CHAMBER|default(45.0 if ns.high_temp else 15.0)|float %}
    G21 G90 M83
    _RESET_STATE
    UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=0
    {% if ns.high_temp %}
        _NOTIFY MSG="Process: Enabling Nevermore VOC filter"
        SET_FAN_SPEED FAN=nevermore SPEED=1.0
    {% endif %}
    ; Start bed non-blocking, then block on hotend preheat -- both heat in parallel
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={target_bed}
    _NOTIFY MSG="Process: Waiting for nozzle to {vars.cfg_preheat_ext}C..."
    M109 S{vars.cfg_preheat_ext}
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
    _NOTIFY MSG="Process: Waiting for bed {target_bed}C..."
    M190 S{target_bed}
    _NOTIFY MSG="Process: Waiting for chamber {target_cha}C..."
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_cha}
    ; Move to purge corner before final heat-up -- prevents ooze onto bed center
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
    G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}
    _NOTIFY MSG="Process: Heating nozzle to {target_ext}C..."
    M109 S{target_ext}
    PRIME_BLOB SKIP_TRAVEL=1  ; already at purge position
    _TOGGLE_FILAMENT_SENSORS ENABLE=0  ; slicer re-enables at layer 2
    _NOTIFY MSG="Process: Print started."

[gcode_macro PRINT_END]
description: Execute sequence -- Finalize print job
gcode:
    M400
    G10
    TURN_OFF_HEATERS
    M107
    _TOOLHEAD_PARK_PAUSE_CANCEL
    M84
    _TOGGLE_FILAMENT_SENSORS ENABLE=1
    _RESET_STATE
    _NEVERMORE_COOLDOWN MSG="Process: Print finished."


# -- Movement & homing ---------------------------------------------------------

[gcode_macro _CONDITIONAL_HOME]
description: Home axes -- G28 only if axes are not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes|lower %}
        _NOTIFY MSG="System: Axes not homed. Executing G28..."
        G28
    {% else %}
        _NOTIFY MSG="System: Axes already homed. Skipping G28."
    {% endif %}

[gcode_macro _HOME_AXIS]
description: Home axis -- Sensorless homing helper reduces current before tap
gcode:
    {% set axis        = params.AXIS|string|lower %}
    {% set vars        = printer["gcode_macro _MY_VARS"] %}
    {% set cur_x       = printer['tmc2209 stepper_x'].run_current|float %}
    {% set cur_y       = printer['tmc2209 stepper_y'].run_current|float %}
    {% set max_vel     = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_accel   = printer.configfile.settings.printer.max_accel|float %}
    _NOTIFY MSG="System: Homing {axis|upper}..."
    SAVE_GCODE_STATE NAME=STATE_HOME_AXIS
    M400
    ; CoreXY: both motors drive every move -- reduce both regardless of target axis
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={vars.cfg_homing_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={vars.cfg_homing_current}
    ; Low accel prevents false StallGuard triggers from high-jerk moves
    SET_VELOCITY_LIMIT VELOCITY=50 ACCEL=1000
    G4 P1000
    G28 {axis|upper}
    G91
    G0 {axis|upper}-10 F1200
    G90
    SET_VELOCITY_LIMIT VELOCITY={max_vel} ACCEL={max_accel}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={cur_x}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={cur_y}
    M400
    RESTORE_GCODE_STATE NAME=STATE_HOME_AXIS

[homing_override]
axes: xyz
gcode:
    {% set vars     = printer["gcode_macro _MY_VARS"] %}
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    {% set home_x   = home_all or 'X' in params %}
    {% set home_y   = home_all or 'Y' in params %}
    {% set home_z   = home_all or 'Z' in params %}
    G90
    ; Safe Z-hop only when Z is already homed -- avoids bed crash on first boot
    {% if "z" in printer.toolhead.homed_axes %}
        {% set z_safe = [printer.toolhead.position.z|float + vars.cfg_z_hop_home,
                         printer.toolhead.axis_maximum.z|float]|min %}
        G0 Z{z_safe} F{vars.calc_travel_speed_z}
    {% endif %}
    {% if home_x %}
        _HOME_AXIS AXIS=X
        G0 X{vars.calc_center_x} F{vars.calc_travel_speed_xy}
    {% endif %}
    {% if home_y %}
        _HOME_AXIS AXIS=Y
        G0 Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}
    {% endif %}
    {% if home_z %}
        ; Guarantee X and Y are homed before probing Z
        {% if (not ("x" in printer.toolhead.homed_axes) and not home_x) or
              (not ("y" in printer.toolhead.homed_axes) and not home_y) %}
            _HOME_AXIS AXIS=X
            G0 X{vars.calc_center_x} F{vars.calc_travel_speed_xy}
            _HOME_AXIS AXIS=Y
            G0 Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}
        {% endif %}
        G0 X{vars.calc_center_x} Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}
        _NOTIFY MSG="System: Homing Z..."
        G28 Z
        G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z}
    {% endif %}
    M400

[gcode_macro CENTER]
description: Move toolhead -- Center with safe Z-bounding
gcode:
    {% set vars   = printer["gcode_macro _MY_VARS"] %}
    {% set z_safe = [printer.toolhead.position.z|float + vars.cfg_z_hop_home,
                     printer.toolhead.axis_maximum.z|float]|min %}
    _NOTIFY MSG="System: Moving to center..."
    SAVE_GCODE_STATE NAME=STATE_CENTER
    G90
    G0 Z{z_safe} F{vars.calc_travel_speed_z}
    G0 X{vars.calc_center_x} Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}
    M400
    RESTORE_GCODE_STATE NAME=STATE_CENTER


# -- Calibration & tuning ------------------------------------------------------

[gcode_macro PID_BED]
description: Tune PID -- Bed heater calibration
gcode:
    {% set target_temp = params.TEMP|default(100.0)|float %}
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    _NOTIFY MSG="System: Bed PID tuning at {target_temp}C..."
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}
    PID_CALIBRATE HEATER=heater_bed TARGET={target_temp}
    _NOTIFY MSG="System: Bed PID done. Save config."

[gcode_macro PID_HOTEND]
description: Tune PID -- Extruder heater calibration
gcode:
    {% set target_temp = params.TEMP|default(245.0)|float %}
    {% set fan_speed   = params.FAN|default(64)|int %}  # ~25% -- simulates ABS print conditions
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    _NOTIFY MSG="System: Extruder PID tuning at {target_temp}C..."
    _CONDITIONAL_HOME
    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}
    M106 S{fan_speed}
    PID_CALIBRATE HEATER=extruder TARGET={target_temp}
    M107
    _NOTIFY MSG="System: Extruder PID done. Save config."


# -- Extruder & filament -------------------------------------------------------

[gcode_macro PRIME_BLOB]
description: Extrude plastic -- Purge nozzle via prime blob
gcode:
    {% set vars       = printer["gcode_macro _MY_VARS"] %}
    {% set vol_mult   = 1.0 / ((0.4 / printer.configfile.settings.extruder.nozzle_diameter|float) ** 2) %}
    {% set e_blob     = (10.0 * vol_mult)|round(3) %}
    {% set skip_travel = params.SKIP_TRAVEL|default(0)|int %}
    {% if printer.extruder.can_extrude %}
        _NOTIFY MSG="Process: Priming nozzle..."
        _TOGGLE_FILAMENT_SENSORS ENABLE=0
        SAVE_GCODE_STATE NAME=STATE_PRIME_BLOB
        G90
        M83
        {% if not skip_travel %}
            G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z}
            G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}
        {% endif %}
        G0 Z0.5 F{vars.calc_travel_speed_z}
        ; Split into 2x to stay within max_extrude_cross_section; F300 presses blob into bed
        G1 E{e_blob} F300
        G1 E{e_blob} F300
        M106 S102
        G1 Z5.0 E{(5.0 * vol_mult)|round(3)} F100  ; lift + attach string to blob top
        {% set stretch_y = [vars.cfg_purge_y + 15.0, printer.toolhead.axis_maximum.y|float]|min %}
        G1 Y{stretch_y} E{(1.0 * vol_mult)|round(3)} F200  ; anchor string to bed
        ; Stepped Y+Z wipe -- Z increments prevent TUNING_TOWER abort
        {% for i in range(4) %}
            {% set loop_y = [vars.cfg_purge_y + 22.0 + (i * 7.0), printer.toolhead.axis_maximum.y|float]|min %}
            {% set loop_z = (3.8 - (i * 1.2))|round(1) %}
            G1 Y{loop_y} Z{loop_z} E{(0.5 * vol_mult)|round(3)} F200
        {% endfor %}
        M107
        {% set tail_y = [vars.cfg_purge_y + 50.0, printer.toolhead.axis_maximum.y|float]|min %}
        G1 Y{tail_y} Z0.2 E{(0.6 * vol_mult)|round(3)} F200  ; tack tail to bed
        {% set snap_x = [vars.cfg_purge_x + 50.0, printer.toolhead.axis_maximum.x|float]|min %}
        G0 X{snap_x} F{vars.calc_travel_speed_xy}  ; fast X snap -- breaks string cleanly
        M400
        RESTORE_GCODE_STATE NAME=STATE_PRIME_BLOB
        _TOGGLE_FILAMENT_SENSORS ENABLE=1
    {% else %}
        _NOTIFY MSG="System Error: Extruder cold. Cannot prime."
    {% endif %}

[gcode_macro LOAD_FILAMENT]
description: Load filament -- Temperature priority managed
gcode:
    {% set vars        = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp    = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set param_temp  = params.TEMP|default(0)|float %}
    {% set cur_target  = printer.extruder.target|float %}
    {% set saved_temp  = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}
    {% set ns = namespace(target=vars.cfg_fallback_temp_ext) %}
    {% if cur_target >= min_temp %}{% set ns.target = cur_target  %}{% endif %}
    {% if saved_temp >= min_temp %}{% set ns.target = saved_temp  %}{% endif %}
    {% if param_temp >= min_temp %}{% set ns.target = param_temp  %}{% endif %}
    {% if ns.target >= min_temp %}
        _NOTIFY MSG="Filament: Heating to {ns.target}C..."
        SAVE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
        M109 S{ns.target}
        _TOGGLE_FILAMENT_SENSORS ENABLE=0
        M83
        _NOTIFY MSG="Filament: Loading {vars.cfg_fil_load_dist}mm..."
        G1 E{vars.cfg_fil_load_dist} F600
        G4 P1000
        _NOTIFY MSG="Filament: Purging {vars.cfg_fil_purge_dist}mm..."
        G1 E{vars.cfg_fil_purge_dist} F100
        G10
        M400
        RESTORE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
        _TOGGLE_FILAMENT_SENSORS ENABLE=1
        ; Clear saved state only after successful load -- prevents interference with manual swaps
        SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE=0.0
        _NOTIFY MSG="Filament: Load complete. Hotend at {ns.target}C."
    {% else %}
        _NOTIFY MSG="System Error: Target {ns.target}C below min_extrude_temp. Aborting."
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament -- Temperature priority managed
gcode:
    {% set vars       = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp   = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set param_temp = params.TEMP|default(0)|float %}
    {% set cur_target = printer.extruder.target|float %}
    {% set saved_temp = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}
    {% set ns = namespace(target=vars.cfg_fallback_temp_ext) %}
    {% if cur_target >= min_temp %}{% set ns.target = cur_target  %}{% endif %}
    {% if saved_temp >= min_temp %}{% set ns.target = saved_temp  %}{% endif %}
    {% if param_temp >= min_temp %}{% set ns.target = param_temp  %}{% endif %}
    {% if ns.target >= min_temp %}
        _NOTIFY MSG="Filament: Heating to {ns.target}C..."
        SAVE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
        M109 S{ns.target}
        _TOGGLE_FILAMENT_SENSORS ENABLE=0
        M83
        _NOTIFY MSG="Filament: Shaping tip..."
        ; Tip shaping -- push then rapidly cycle to break strings before unload
        G1 E10.0 F300
        G1 E-15.0 F3000
        {% for _ in range(4) %}
            G1 E2.0 F3000
            G1 E-2.0 F3000
        {% endfor %}
        _NOTIFY MSG="Filament: Unloading {vars.cfg_fil_unload_dist}mm..."
        G1 E-{vars.cfg_fil_unload_dist} F300
        M400
        RESTORE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
        _TOGGLE_FILAMENT_SENSORS ENABLE=1
        _NOTIFY MSG="Filament: Unload complete."
    {% else %}
        _NOTIFY MSG="System Error: Target {ns.target}C below min_extrude_temp. Aborting."
    {% endif %}

[gcode_macro M600]
description: Change filament -- Initiate swap process
gcode:
    {% set target = printer.extruder.target|float %}
    SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE={target}
    PAUSE
    M400
    UNLOAD_FILAMENT TEMP={target}
    ; Cool down to prevent cooking filament during extended absence
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    _NOTIFY MSG="Action: Change filament. Extruder cooling down."

[gcode_macro _TOGGLE_FILAMENT_SENSORS]
description: Toggle state -- Enable or disable filament sensor
gcode:
    {% set state = params.ENABLE|default(1)|int %}
    SET_FILAMENT_SENSOR SENSOR=runout_sensor ENABLE={state}


